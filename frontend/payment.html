    <style>
        body { 
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #E5E7EB; 
            font-family: 'Manrope', sans-serif;
            position: relative;

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);

            z-index: 0;
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        header {
            background: rgba(26, 26, 46, 0.9) !important;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2) !important;
            backdrop-filter: blur(15px);
        }
        
        .paket-vip { 
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .paket-vip:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }
        
        .paket-vip button {
            background: linear-gradient(135deg, #d4af37 0%, #f0d266 100%);
            color: #0f0f1e;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .paket-vip button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }
        
        nav a {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        nav a:hover {
            color: #d4af37 !important;
            transform: scale(1.1);
        }
    </style>

<body>
    <div class="w-full h-screen overflow-hidden relative flex flex-col">
        
        <header class="w-full z-20 py-3 text-center">
            <h1 class="text-xl font-bold tracking-wide">Beli VIP</h1>
        </header>
        
        <main class="flex-1 overflow-y-auto scrollbar-hide p-4 pb-24">
            <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-white mb-4">💎 Pilih Paket VIP Kamu</h1>

        <div class="space-y-4">
            <div class="paket-vip p-4 rounded-lg">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="font-bold text-white text-lg">1 Hari</h2>
                        <p class="text-sm text-gray-400">VIP 1 Hari</p>
                    </div>
                    <button onclick="beliPaket(1, 2000, 'VIP 1 Hari')"
                            class="py-2 px-4 rounded-md">
                        Rp 2.000
                    </button>
                </div>
            </div>

            <div class="paket-vip p-4 rounded-lg">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="font-bold text-white text-lg">3 Hari</h2>
                        <p class="text-sm text-gray-400">VIP 3 Hari</p>
                    </div>
                    <button onclick="beliPaket(2, 5000, 'VIP 3 Hari')"
                            class="py-2 px-4 rounded-md">
                        Rp 5.000
                    </button>
                </div>
            </div>
            
            <div class="paket-vip p-4 rounded-lg">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="font-bold text-white text-lg">7 Hari</h2>
                        <p class="text-sm text-gray-400">VIP 7 Hari</p>
                    </div>
                    <button onclick="beliPaket(3, 10000, 'VIP 7 Hari')"
                            class="py-2 px-4 rounded-md">
                        Rp 10.000
                    </button>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>
    
    <script src="navbar.js?v=222222222"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.enableClosingConfirmation();
        
        tg.disableVerticalSwipes();
        console.log("🔒 Vertical swipes disabled - mini app tidak akan close saat scroll");

        const user = tg.initDataUnsafe?.user;
        if (!user || !user.id) {
            alert('Error: Data user Telegram tidak tersedia. Silakan tutup dan buka kembali aplikasi.');
            throw new Error('Telegram user data not available');
        }
        const telegram_id = user.id;
        
        let midtransClientKey = null;
        let snapScriptLoaded = false;
        
        async function loadMidtransScript() {
            try {
                const configResponse = await fetch(window.API_BASE_URL + '/api/v1/config');
                const config = await configResponse.json();
                midtransClientKey = config.midtrans_client_key;
                
                const script = document.createElement('script');
                script.src = 'https://app.sandbox.midtrans.com/snap/snap.js';
                script.setAttribute('data-client-key', midtransClientKey);
                script.onload = () => {
                    snapScriptLoaded = true;
                    console.log('✅ Midtrans Snap loaded');
                };
                script.onerror = () => {
                    console.error('❌ Failed to load Midtrans Snap');
                    alert('Gagal memuat sistem pembayaran. Silakan refresh halaman.');
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('Error loading Midtrans config:', error);
                alert('Gagal memuat konfigurasi. Silakan refresh halaman.');
            }
        }
        
        loadMidtransScript();

        async function beliPaket(paketId, harga, namaPaket) {
            if (!snapScriptLoaded) {
                alert('Sistem pembayaran sedang dimuat. Silakan tunggu sebentar dan coba lagi.');
                return;
            }
            
            console.log(`Mencoba beli: ${namaPaket} (Rp ${harga})`);
            
            const paymentData = {
                telegram_id: telegram_id,
                paket_id: paketId,
                gross_amount: harga,
                nama_paket: namaPaket
            };

            try {
                const apiUrl = window.API_BASE_URL + '/api/v1/create_payment';
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentData)
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Gagal bikin token Snap');
                }

                const data = await response.json();
                const snapToken = data.snap_token;

                snap.pay(snapToken, {
                    onSuccess: function(result){
                        alert('Pembayaran sukses! Kamu sekarang VIP.');
                        tg.close();
                    },
                    onPending: function(result){
                        alert('Pembayaran ditunda.');
                    },
                    onError: function(result){
                        alert('Pembayaran Gagal!');
                    }
                });

            } catch (error) {
                console.error('Error:', error);
                alert(`Gagal konek ke server: ${error.message}`);
            }
        }
    </script>
    <script src="cache-manager?t=555555555".js?v=222222222"></script>
